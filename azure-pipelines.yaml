trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

stages:

  - stage: Build
    jobs:
      - job: BuildAndTest
        steps:
          - task: SonarCloudPrepare@3
            inputs:
              SonarCloud: 'azure-devops-token'
              organization: 'nel-ctrl'
              scannerMode: 'cli'
              configMode: 'manual'
              cliProjectKey: 'Nel-ctrl_Group_6_COMP308_Final_Project'
              cliProjectName: 'CommunityHub'
              cliSources: 'server/services/auth-service'

          - script: |
              cd server/services/auth-service
              npm install
            displayName: 'Install dependencies'

          - script: |
              cd server/services/auth-service
              npm test --if-present
            displayName: 'Run unit tests'

          - task: SonarCloudAnalyze@3

     

  - stage: Deliver
    dependsOn: Build
    jobs:
      - job: DeliverArtifact
        steps:
          - script: |
              cd server/services/auth-service
              npm pack
            displayName: 'Package artifact with npm pack'

  - stage: DeployDev
    dependsOn: Deliver
    jobs:
      - job: Deploy
        steps:
          - script: echo 'Deploying CommunityHub to Dev environment'
            displayName: 'Deploy to Dev'

  - stage: DeployQAT
    dependsOn: DeployDev
    jobs:
      - job: Deploy
        steps:
          - script: echo 'Deploying CommunityHub to QAT environment'
            displayName: 'Deploy to QAT'

  - stage: DeployStaging
    dependsOn: DeployQAT
    jobs:
      - job: Deploy
        steps:
          - script: echo 'Deploying CommunityHub to Staging environment'
            displayName: 'Deploy to Staging'

  - stage: DeployProd
    dependsOn: DeployStaging
    jobs:
      - job: Deploy
        steps:
          - script: echo 'Deploying CommunityHub to Production environment'
            displayName: 'Deploy to Production'
